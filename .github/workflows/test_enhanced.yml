name: Enhanced Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        
    - name: Test basic examples
      run: |
        echo "Testing basic examples..."
        renzmc examples/dasar/01_hello_world.rmc
        renzmc examples/dasar/02_kalkulator_sederhana.rmc
        
    - name: Test functional programming
      run: |
        echo "Testing functional programming..."
        renzmc examples/functional_programming/01_lambda_functions.rmc
        renzmc examples/functional_programming/02_comprehensions.rmc
        
    - name: Test control flow
      run: |
        echo "Testing control flow..."
        renzmc examples/control_flow/01_ternary_operator.rmc
        
    - name: Test OOP
      run: |
        echo "Testing OOP..."
        renzmc examples/advanced_features/01_oop_classes.rmc
        renzmc examples/advanced_features/03_oop_advanced.rmc
        
    - name: Test built-in functions
      run: |
        echo "Testing built-in functions..."
        renzmc examples/builtin_functions/01_string_functions.rmc
        renzmc examples/builtin_functions/02_math_statistics.rmc
        renzmc examples/builtin_functions/03_iteration_functions.rmc
        
    - name: Test data structures
      run: |
        echo "Testing data structures..."
        renzmc examples/data_structures/01_stack.rmc
        renzmc examples/data_structures/02_queue.rmc
        renzmc examples/data_structures/04_set_operations.rmc
        
    - name: Test algorithms
      run: |
        echo "Testing algorithms..."
        renzmc examples/algorithms/01_binary_search.rmc
        renzmc examples/algorithms/02_searching_algorithms.rmc
        
    - name: Test Python integration
      run: |
        echo "Testing Python integration..."
        renzmc examples/python_integration/01_web_scraping.rmc
        renzmc examples/python_integration/02_data_analysis.rmc
        
    - name: Test database operations
      run: |
        echo "Testing database operations..."
        renzmc examples/database/01_sqlite_basic.rmc
        renzmc examples/database/03_database_wrapper.rmc
        
    - name: Run comprehensive test suite
      run: |
        echo "Running comprehensive test suite..."
        python test_examples.py
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          test_results.json
          test_results_working.txt
          test_results_errors.txt